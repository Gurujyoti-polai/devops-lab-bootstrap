---
- name: Update all packages
  ansible.builtin.dnf:
    name: "*"
    state: latest
  become: true

- name: Install core tools
  ansible.builtin.dnf:
    name:
      - git
      - unzip
      - jq
      - tree
      - htop
      - net-tools
      - bind-utils
      - traceroute
      - nmap
      - tcpdump
      - openssl
    state: present
  become: true

# curl-minimal is already installed on AL2023 and conflicts with full curl
# It supports all flags we need: -I, -L, -v, -w, -X POST etc.
- name: Verify curl-minimal is present
  ansible.builtin.command: curl --version
  changed_when: false

- name: Install Docker
  ansible.builtin.dnf:
    name: docker
    state: present
  become: true

- name: Start and enable Docker
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
  become: true

- name: Add ec2-user to docker group
  ansible.builtin.user:
    name: ec2-user
    groups: docker
    append: true
  become: true

- name: Install Python3 and pip
  ansible.builtin.dnf:
    name:
      - python3
      - python3-pip
    state: present
  become: true

- name: Install boto3 via pip
  ansible.builtin.pip:
    name:
      - boto3
      - botocore
    state: present
  become: true

- name: Set hostname
  ansible.builtin.hostname:
    name: "devops-lab-{{ phase_name }}"
  become: true
  vars:
    phase_name: "{{ hostvars[inventory_hostname]['ec2_tags']['Phase'] | default('unknown') }}"

- name: Print lab ready message
  ansible.builtin.debug:
    msg: |
      Lab instance ready
        IP:    {{ ansible_host }}
        Phase: {{ hostvars[inventory_hostname]['ec2_tags']['Phase'] | default('unknown') }}
        SSH:   ssh -i ~/.ssh/devops-lab ec2-user@{{ ansible_host }}
