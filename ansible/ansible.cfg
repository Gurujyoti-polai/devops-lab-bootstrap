[defaults]
# Point to the dynamic inventory
inventory = ./inventory/aws_ec2.yml

# Don't prompt to accept new host keys — lab environment
host_key_checking = False

# Faster SSH — reuse connections across tasks
pipelining = True

# Timeout for SSH connections
timeout = 30

# Show task timing at the end of each run
callback_plugins = profile_tasks

[ssh_connection]
# Retry on SSH failures — EC2 sometimes takes a moment to accept connections
retries = 3
